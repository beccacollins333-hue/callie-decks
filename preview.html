<!DOCTYPE html>
<html>
<head>
<title>Mobile Preview</title>
<style>
  body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; padding: 30px; font-family: -apple-system, sans-serif; }
  h1 { color: #fff; font-size: 18px; font-weight: 300; margin-bottom: 10px; }
  .controls { margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .controls button { padding: 8px 16px; border: 1px solid #555; background: #333; color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .controls button.active { background: #2d8a6e; border-color: #2d8a6e; }
  .sliders { margin-bottom: 20px; background: #222; padding: 16px 24px; border-radius: 10px; display: flex; gap: 20px; align-items: center; }
  .sliders label { color: #fff; font-size: 13px; white-space: nowrap; }
  .sliders input[type=range] { width: 200px; }
  .sliders .val { color: #0f0; font-size: 15px; font-weight: bold; min-width: 40px; }
  .phone-frame { width: 390px; height: 844px; border: 3px solid #444; border-radius: 40px; overflow: hidden; background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.5); position: relative; }
  .phone-frame::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #000; border-radius: 0 0 16px 16px; z-index: 10; }
  iframe { width: 100%; height: 100%; border: none; border-radius: 37px; }
</style>
</head>
<body>
  <h1>Mobile Preview — iPhone 14 (390×844)</h1>
  <div class="controls">
    <button onclick="load('krispy-kreme')" class="active">Krispy Kreme</button>
    <button onclick="load('skydio')">Skydio</button>
    <button onclick="load('dji-osmo')">DJI Osmo</button>
    <button onclick="load('dji')">DJI</button>
    <button onclick="load('canon-mexico')">Canon MX</button>
    <button onclick="load('coca-cola')">Coca-Cola</button>
    <button onclick="load('ray-ban-meta')">Ray-Ban Meta</button>
    <button onclick="load('polarpro')">PolarPro</button>
    <button onclick="load('hyundai')">Hyundai</button>
    <button onclick="load('omega')">Omega</button>
    <button onclick="load('rimowa')">Rimowa</button>
    <button onclick="load('jacob-and-co')">Jacob & Co.</button>
    <button onclick="load('visit-abu-dhabi')">Abu Dhabi</button>
    <button onclick="load('visit-dubai')">Dubai</button>
    <button onclick="load('suspicious-antwerp')">Suspicious</button>
    <button onclick="load('db-equipment')">Db Journey</button>
    <button onclick="load('united-airlines')">United</button>
    <button onclick="load('autel')">Autel</button>
    <button onclick="load('akaso')">AKASO</button>
    <button onclick="load('ombraz')">Ombraz</button>
    <button onclick="load('frog-fuel')">Frog Fuel</button>
    <button onclick="load('hypershell')">HyperShell</button>
    <button onclick="load('red-bull')">Red Bull</button>
    <button onclick="load('padi')">PADI</button>
    <button onclick="load('visit-south-africa')">Visit SA</button>
    <button onclick="load('ralph-lauren')">Ralph Lauren</button>
    <button onclick="load('vita-coco')">Vita Coco</button>
    <button onclick="load('insta360')">Insta360</button>
    <button onclick="load('sony-alpha')">Sony Alpha</button>
    <button onclick="load('la-roche-posay')">La Roche-Posay</button>
    <button onclick="load('sunkissed')">Sunkissed</button>
    <button onclick="load('evosim')">EvoSim</button>
    <button onclick="load('powerade')">Powerade</button>
    <button onclick="load('ford-brasil')">Ford Brasil</button>
  </div>
  <div class="sliders">
    <label>Jordan crop:</label>
    <input type="range" id="jordan-slider" min="0" max="100" value="50">
    <span id="jordan-val" class="val">50%</span>
  </div>
  <div class="phone-frame">
    <iframe id="deck" src="krispy-kreme.html"></iframe>
  </div>
  <script>
    function load(slug) {
      document.getElementById('deck').src = slug + '.html';
      document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }

    const jordanSlider = document.getElementById('jordan-slider');
    const jordanVal = document.getElementById('jordan-val');

    jordanSlider.addEventListener('input', () => {
      jordanVal.textContent = jordanSlider.value + '%';
      try {
        const iframe = document.getElementById('deck');
        const img = iframe.contentDocument.querySelector('.work-grid .work-item:nth-child(2) img');
        if (img) img.style.objectPosition = 'center ' + jordanSlider.value + '%';
      } catch(e) {}
    });
  </script>
</body>
</html>
